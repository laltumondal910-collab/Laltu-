<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table of Elements</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 10px;
    font-size: 2.5em;
}

.subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-size: 1.1em;
}

.controls {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

#searchInput, #categoryFilter {
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    transition: all 0.3s ease;
}

#searchInput {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
}

#searchInput:focus, #categoryFilter:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.periodic-table {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 8px;
    margin-bottom: 30px;
    background: #f5f5f5;
    padding: 20px;
    border-radius: 10px;
}

.element {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 2px solid rgba(0, 0, 0, 0.1);
    font-weight: bold;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.element:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.element.hidden {
    display: none;
}

.element-number {
    font-size: 0.65em;
    opacity: 0.7;
}

.element-symbol {
    font-size: 1.5em;
    margin: 2px 0;
}

.element-name {
    font-size: 0.7em;
    opacity: 0.8;
}

.element-mass {
    font-size: 0.65em;
    opacity: 0.6;
}

/* Element Category Colors */
.nonmetal {
    background: #7cb342;
    color: white;
}

.noble-gas {
    background: #ab47bc;
    color: white;
}

.alkali-metal {
    background: #ffb74d;
    color: white;
}

.alkaline-earth-metal {
    background: #ffd54f;
    color: #333;
}

.metalloid {
    background: #4db6ac;
    color: white;
}

.halogen {
    background: #29b6f6;
    color: white;
}

.transition-metal {
    background: #ef5350;
    color: white;
}

.lanthanide {
    background: #ce93d8;
    color: white;
}

.actinide {
    background: #90caf9;
    color: white;
}

.post-transition-metal {
    background: #80cbc4;
    color: white;
}

.legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    padding: 20px;
    background: #f5f5f5;
    border-radius: 10px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9em;
}

.legend-box {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    border: 2px solid rgba(0, 0, 0, 0.1);
}

.legend-box.nonmetal { background: #7cb342; }
.legend-box.noble-gas { background: #ab47bc; }
.legend-box.alkali-metal { background: #ffb74d; }
.legend-box.alkaline-earth-metal { background: #ffd54f; }
.legend-box.metalloid { background: #4db6ac; }
.legend-box.halogen { background: #29b6f6; }
.legend-box.transition-metal { background: #ef5350; }
.legend-box.lanthanide { background: #ce93d8; }
.legend-box.actinide { background: #90caf9; }
.legend-box.post-transition-metal { background: #80cbc4; }

/* Modal Styles */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease;
}

.modal.show {
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.close {
    position: absolute;
    right: 20px;
    top: 15px;
    font-size: 2em;
    cursor: pointer;
    color: #999;
    transition: color 0.3s ease;
}

.close:hover {
    color: #333;
}

.element-detail-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 2px solid #eee;
}

.element-large {
    font-size: 4em;
    font-weight: bold;
    min-width: 100px;
    text-align: center;
}

.element-title h2 {
    font-size: 2em;
    color: #333;
    margin-bottom: 5px;
}

.element-title p {
    color: #666;
    font-size: 1.1em;
}

.element-properties {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.property {
    padding: 12px;
    background: #f5f5f5;
    border-radius: 8px;
    border-left: 4px solid #667eea;
}

.property-label {
    font-size: 0.85em;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
}

.property-value {
    font-size: 1.1em;
    font-weight: bold;
    color: #333;
}

@media (max-width: 1024px) {
    .periodic-table {
        grid-template-columns: repeat(12, 1fr);
    }
}

@media (max-width: 768px) {
    .container {
        padding: 15px;
    }

    h1 {
        font-size: 1.8em;
    }

    .periodic-table {
        grid-template-columns: repeat(8, 1fr);
        gap: 5px;
    }

    .controls {
        flex-direction: column;
    }

    #searchInput {
        max-width: 100%;
    }

    .element {
        padding: 4px;
    }

    .element-symbol {
        font-size: 1.2em;
    }

    .element-name {
        font-size: 0.6em;
    }
}

@media (max-width: 480px) {
    .periodic-table {
        grid-template-columns: repeat(6, 1fr);
        gap: 3px;
    }

    .element {
        padding: 2px;
    }

    .element-number, .element-name, .element-mass {
        font-size: 0.5em;
    }

    .element-symbol {
        font-size: 0.9em;
    }
}
    </style>

    </div>

    <div id="modal" class="modal">

let allElements = elements;
let filteredElements = [...allElements];

const periodicTable = document.getElementById('periodicTable');
const searchInput = document.getElementById('searchInput');
const categoryFilter = document.getElementById('categoryFilter');
const modal = document.getElementById('modal');
const elementDetails = document.getElementById('elementDetails');
const closeBtn = document.querySelector('.close');

function renderPeriodicTable() {
    periodicTable.innerHTML = '';
    filteredElements.forEach(element => {
        const elementDiv = document.createElement('div');
        elementDiv.className = `element ${element.category}`;
        elementDiv.innerHTML = `
            <div class="element-number">${element.number}</div>
            <div class="element-symbol">${element.symbol}</div>
            <div class="element-name">${element.name}</div>
            <div class="element-mass">${element.mass}</div>
        `;
        elementDiv.addEventListener('click', () => showElementDetails(element));
        periodicTable.appendChild(elementDiv);
    });
}

function getElementColor(category) {
    const colors = {
        'nonmetal': '#7cb342',
        'noble-gas': '#ab47bc',
        'alkali-metal': '#ffb74d',
        'alkaline-earth-metal': '#ffd54f',
        'metalloid': '#4db6ac',
        'halogen': '#29b6f6',
        'transition-metal': '#ef5350',
        'lanthanide': '#ce93d8',
        'actinide': '#90caf9',
        'post-transition-metal': '#80cbc4'
    };
    return colors[category] || '#999';
}

function showElementDetails(element) {
    const description = elementDescriptions[element.number] || 'A fascinating element of the periodic table.';
    
    elementDetails.innerHTML = `
        <div class="element-detail-header">
            <div class="element-large" style="background: ${getElementColor(element.category)}; color: white; border-radius: 10px;">
                ${element.symbol}
            </div>
            <div class="element-title">
                <h2>${element.name}</h2>
                <p>Atomic Number: ${element.number}</p>
            </div>
        </div>
        
        <div style="margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px;">
            <h3 style="margin-bottom: 10px; color: #333;">Description</h3>
            <p style="line-height: 1.6; color: #555; font-size: 0.95em;">${description}</p>
        </div>
        
        <div class="element-properties">
            <div class="property">
                <div class="property-label">Atomic Mass</div>
                <div class="property-value">${element.mass} u</div>
            </div>
            <div class="property">
                <div class="property-label">Category</div>
                <div class="property-value">${element.category.replace('-', ' ').charAt(0).toUpperCase() + element.category.replace('-', ' ').slice(1)}</div>
            </div>
            <div class="property">
                <div class="property-label">Electron Configuration</div>
                <div class="property-value">${element.electronConfig}</div>
            </div>
            <div class="property">
                <div class="property-label">Oxidation States</div>
                <div class="property-value">${element.oxidationStates}</div>
            </div>
            <div class="property">
                <div class="property-label">Boiling Point (°C)</div>
                <div class="property-value">${element.boiling}</div>
            </div>
            <div class="property">
                <div class="property-label">Melting Point (°C)</div>
                <div class="property-value">${element.melting}</div>
            </div>
            <div class="property">
                <div class="property-label">Density (g/cm³)</div>
                <div class="property-value">${element.density}</div>
            </div>
        </div>
    `;
    modal.classList.add('show');
    
    console.log(`\n${'='.repeat(50)}`);
    console.log(`Element: ${element.name} (${element.symbol})`);
    console.log(`${'='.repeat(50)}`);
    console.log(`Atomic Number: ${element.number}`);
    console.log(`Atomic Mass: ${element.mass} u`);
    console.log(`Category: ${element.category}`);
    console.log(`Electron Configuration: ${element.electronConfig}`);
    console.log(`Oxidation States: ${element.oxidationStates}`);
    console.log(`Boiling Point: ${element.boiling}°C`);
    console.log(`Melting Point: ${element.melting}°C`);
    console.log(`Density: ${element.density} g/cm³`);
    console.log(`\nDescription:\n${description}`);
    console.log(`${'='.repeat(50)}\n`);
}

searchInput.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    filteredElements = allElements.filter(element => 
        element.name.toLowerCase().includes(searchTerm) ||
        element.symbol.toLowerCase().includes(searchTerm) ||
        element.number.toString().includes(searchTerm)
    );
    renderPeriodicTable();
});

categoryFilter.addEventListener('change', (e) => {
    const selectedCategory = e.target.value;
    if (selectedCategory === '') {
        filteredElements = [...allElements];
    } else {
        filteredElements = allElements.filter(element => element.category === selectedCategory);
    }
    renderPeriodicTable();
});

closeBtn.addEventListener('click', () => {
    modal.classList.remove('show');
});

window.addEventListener('click', (e) => {
    if (e.target === modal) {
        modal.classList.remove('show');
    }
});

renderPeriodicTable();
